[build]
builder = "nixpacks"

[[services]]
name = "backend"
source = "backend"

[services.backend.deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"

[[services]]
name = "whatsapp"
source = "whatsapp"

[services.whatsapp.deploy]
startCommand = "node index.js"
