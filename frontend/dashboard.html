<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PedroOS — Dashboard</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gray: {
                            750: '#2d3748',
                            850: '#1a202c',
                            950: '#0d1117',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(139, 92, 246, 0); }
        }
        .pulse-glow { animation: pulse-glow 2s infinite; }
        .font-mono-timer { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    </style>
</head>
<body class="bg-gray-950 text-white antialiased">
<div x-data="dashboard()" x-init="init()" class="flex h-screen overflow-hidden">

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="flex-1 overflow-y-auto p-6 space-y-6">

        <!-- ===== TIME BAR ===== -->
        <div class="flex items-center gap-4">
            <div class="flex-1 relative">
                <div class="h-2 bg-gray-800 rounded-full overflow-hidden">
                    <div class="h-full rounded-full transition-all duration-1000 ease-out"
                         :style="`width: ${workProgress}%; background: linear-gradient(90deg, #6366f1, ${workProgress > 80 ? '#ef4444' : '#8b5cf6'});`">
                    </div>
                </div>
                <div class="absolute top-1/2 w-3 h-3 bg-white rounded-full border-2 border-violet-500 z-10"
                     :style="`left: ${workProgress}%; transform: translate(-50%, -50%);`"
                     style="box-shadow: 0 0 10px rgba(139,92,246,0.5);">
                </div>
                <div class="flex justify-between mt-1.5">
                    <span class="text-[10px] text-gray-600">9:00</span>
                    <span class="text-[10px] text-gray-600">12:00</span>
                    <span class="text-[10px] text-gray-600">15:00</span>
                    <span class="text-[10px] text-gray-600">18:00</span>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-gray-800/60 border border-gray-700 rounded-lg px-3 py-1.5 shrink-0">
                <svg class="w-3.5 h-3.5 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke-width="2"/>
                    <path stroke-width="2" d="M12 6v6l4 2"/>
                </svg>
                <span class="text-sm font-medium text-gray-200" x-text="freeTimeText"></span>
                <span class="text-xs text-gray-500">livre</span>
            </div>
        </div>

        <!-- ===== NOW CARD ===== -->
        <div x-show="nowTask" x-cloak>
            <div class="relative overflow-hidden rounded-2xl border border-violet-500/30 p-5"
                 style="background: linear-gradient(135deg, rgba(139,92,246,0.06), rgba(59,130,246,0.03));">
                <div class="absolute inset-0 bg-gradient-to-r from-violet-600/5 to-transparent pointer-events-none"></div>
                <div class="flex items-center justify-between mb-3 relative">
                    <div class="flex items-center gap-2">
                        <span class="text-lg">🎯</span>
                        <span class="text-xs font-medium uppercase tracking-wider text-violet-400">Agora</span>
                        <span x-show="timerActive" class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span x-show="timerActive" x-text="formatTimer(timerSeconds)"
                              class="text-sm font-mono-timer text-violet-300 bg-violet-500/10 px-2 py-0.5 rounded">
                        </span>
                        <button @click="toggleTimer()"
                                :class="timerActive ? 'bg-violet-500/20 text-violet-300' : 'text-gray-500 hover:text-violet-400 hover:bg-gray-800'"
                                class="p-1.5 rounded-lg transition">
                            <svg x-show="!timerActive" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" stroke-width="2"/>
                                <path stroke-width="2" d="M12 6v6l4 2"/>
                            </svg>
                            <svg x-show="timerActive" class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                                <rect x="6" y="4" width="4" height="16" rx="1"/>
                                <rect x="14" y="4" width="4" height="16" rx="1"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="relative">
                    <div class="flex items-center gap-2 mb-1">
                        <template x-if="nowTask?.project">
                            <span class="text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded"
                                  :style="`background: ${getProjectColor(nowTask.project)}20; color: ${getProjectColor(nowTask.project)}; border: 1px solid ${getProjectColor(nowTask.project)}40;`"
                                  x-text="nowTask.project">
                            </span>
                        </template>
                        <template x-if="nowTask?.deadline_urgency && nowTask.deadline_urgency !== 'none'">
                            <span class="text-xs px-1.5 py-0.5 rounded"
                                  :class="urgencyClasses(nowTask.deadline_urgency)"
                                  x-text="urgencyLabel(nowTask.deadline_urgency, nowTask.deadline)">
                            </span>
                        </template>
                    </div>
                    <h2 class="text-xl font-semibold text-white mt-2" x-text="nowTask?.title"></h2>
                    <p x-show="nowTask?.notes" class="text-sm text-gray-400 mt-1 line-clamp-1" x-text="nowTask?.notes"></p>
                    <span x-show="nowTask?.estimated_minutes" class="text-xs text-gray-500 mt-2 inline-block">
                        ⏱ ~<span x-text="nowTask?.estimated_minutes"></span>min estimados
                    </span>
                </div>
                <div class="flex items-center gap-2 mt-4 relative">
                    <button @click="completeTask(nowTask?.id)"
                            class="flex items-center gap-1.5 bg-green-500/10 border border-green-500/30 text-green-400 px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-500/20 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                        </svg>
                        Concluir
                    </button>
                    <button @click="switchNowTask()"
                            class="flex items-center gap-1.5 bg-gray-800 border border-gray-700 text-gray-300 px-4 py-2 rounded-lg text-sm hover:bg-gray-700 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                        </svg>
                        Trocar
                    </button>
                    <a href="/" class="ml-auto flex items-center gap-1.5 text-xs text-gray-600 hover:text-gray-400 transition">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2" stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                        Todas as tarefas
                    </a>
                </div>
            </div>
        </div>
        <div x-show="!nowTask" x-cloak
             class="relative overflow-hidden rounded-2xl border border-dashed border-gray-700 p-8 text-center">
            <div class="text-4xl mb-3">🧘</div>
            <h3 class="text-gray-400 text-lg">Nenhuma tarefa ativa</h3>
            <p class="text-gray-600 text-sm mt-1">Escolha uma tarefa abaixo ou use 🎯 /foco</p>
        </div>

        <!-- ===== TODAY SECTION ===== -->
        <section x-show="todayTasks.length > 0">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-3">
                    <h2 class="text-sm font-medium uppercase tracking-wider text-gray-400">📋 Hoje</h2>
                    <span class="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded-full" x-text="todayTasks.length"></span>
                </div>
                <span class="text-xs"
                      :class="totalEstimated > freeMinutes ? 'text-red-400' : 'text-gray-500'"
                      x-text="`~${Math.round(totalEstimated / 60)}h estimadas${totalEstimated > freeMinutes ? ' ⚠️' : ''}`">
                </span>
            </div>
            <div class="space-y-1">
                <template x-for="task in todayTasks" :key="task.id">
                    <div>
                        <div class="flex items-center justify-between py-2.5 px-3 rounded-lg bg-gray-900/60 border border-gray-800 hover:border-gray-700 transition group"
                             :class="`border-l-[3px] ${urgencyBorderClass(task.deadline_urgency)}`">
                            <div class="flex items-center gap-3 flex-1 min-w-0">
                                <button x-show="task.subtasks && task.subtasks.length > 0"
                                        @click="task._expanded = !task._expanded"
                                        class="p-0.5 text-gray-600 hover:text-gray-400 transition">
                                    <svg class="w-3.5 h-3.5 transition-transform" :class="task._expanded ? 'rotate-90' : ''"
                                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-width="2" stroke-linecap="round" d="M9 5l7 7-7 7"/>
                                    </svg>
                                </button>
                                <div x-show="!task.subtasks || task.subtasks.length === 0" class="w-[18px]"></div>
                                <span x-show="task.project"
                                      class="text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded shrink-0"
                                      :style="`background: ${getProjectColor(task.project)}20; color: ${getProjectColor(task.project)}; border: 1px solid ${getProjectColor(task.project)}40;`"
                                      x-text="task.project">
                                </span>
                                <span class="text-sm text-gray-200 truncate" x-text="task.title"></span>
                                <span x-show="task.notes" class="text-xs text-gray-600 truncate max-w-[150px] hidden lg:inline"
                                      x-text="`· ${task.notes}`"></span>
                            </div>
                            <div class="flex items-center gap-3 shrink-0">
                                <span x-show="task.short_id" class="text-xs text-gray-700 font-mono hidden md:inline" x-text="task.short_id"></span>
                                <span x-show="task.deadline_urgency && task.deadline_urgency !== 'none'"
                                      class="text-xs px-1.5 py-0.5 rounded"
                                      :class="urgencyClasses(task.deadline_urgency)"
                                      x-text="urgencyLabel(task.deadline_urgency, task.deadline)">
                                </span>
                                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition">
                                    <button @click="setAsNow(task.id)"
                                            class="p-1.5 text-gray-500 hover:text-violet-400 hover:bg-violet-500/10 rounded-md transition"
                                            title="Fazer agora">
                                        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M8 5v14l11-7z"/>
                                        </svg>
                                    </button>
                                    <button @click="completeTask(task.id)"
                                            class="p-1.5 text-gray-500 hover:text-green-400 hover:bg-green-500/10 rounded-md transition"
                                            title="Concluir">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-width="2" stroke-linecap="round" d="M5 13l4 4L19 7"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- ===== BLOCKED SECTION ===== -->
        <section x-show="blockedTasks.length > 0" x-cloak>
            <button @click="showBlocked = !showBlocked" class="flex items-center gap-2 mb-3">
                <span class="text-sm font-medium uppercase tracking-wider text-amber-500/70">⏸ Bloqueado</span>
                <span class="text-xs bg-amber-500/10 text-amber-500 px-2 py-0.5 rounded-full" x-text="blockedTasks.length"></span>
                <svg class="w-3.5 h-3.5 text-gray-600 transition-transform" :class="showBlocked ? 'rotate-180' : ''"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2" stroke-linecap="round" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
            <div x-show="showBlocked" class="space-y-1">
                <template x-for="task in blockedTasks" :key="task.id">
                    <div class="flex items-center justify-between py-2.5 px-3 rounded-lg bg-gray-900/50 border border-gray-800/50 opacity-70 hover:opacity-100 transition group">
                        <div class="flex items-center gap-3">
                            <div class="w-1.5 h-1.5 bg-amber-500/60 rounded-full"></div>
                            <span x-show="task.project"
                                  class="text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded shrink-0"
                                  :style="`background: ${getProjectColor(task.project)}20; color: ${getProjectColor(task.project)}; border: 1px solid ${getProjectColor(task.project)}40;`"
                                  x-text="task.project">
                            </span>
                            <span class="text-sm text-gray-400" x-text="task.title"></span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-amber-500/60 max-w-[200px] truncate" x-text="task.blocker"></span>
                            <span x-show="task.blocker_days >= 3" class="text-xs text-red-400/60" x-text="`${task.blocker_days}d`"></span>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- ===== QUEUED / BACKLOG ===== -->
        <section x-show="queuedTasks.length > 0 || backlogTasks.length > 0">
            <div x-show="queuedTasks.length > 0" class="mb-4">
                <button @click="showQueued = !showQueued" class="flex items-center gap-2 mb-2">
                    <span class="text-sm font-medium uppercase tracking-wider text-gray-500">Na Fila</span>
                    <span class="text-xs bg-gray-800 text-gray-500 px-2 py-0.5 rounded-full" x-text="queuedTasks.length"></span>
                    <svg class="w-3.5 h-3.5 text-gray-600 transition-transform" :class="showQueued ? 'rotate-180' : ''"
                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2" stroke-linecap="round" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div x-show="showQueued" class="space-y-1 opacity-70">
                    <template x-for="task in queuedTasks" :key="task.id">
                        <div class="flex items-center justify-between py-2 px-3 rounded-lg border border-gray-800/50 hover:border-gray-700 transition group border-l-[3px] border-l-transparent">
                            <div class="flex items-center gap-3 flex-1 min-w-0">
                                <div class="w-[18px]"></div>
                                <span x-show="task.project"
                                      class="text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded shrink-0"
                                      :style="`background: ${getProjectColor(task.project)}20; color: ${getProjectColor(task.project)}; border: 1px solid ${getProjectColor(task.project)}40;`"
                                      x-text="task.project">
                                </span>
                                <span class="text-sm text-gray-400 truncate" x-text="task.title"></span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span x-show="task.deadline_urgency && task.deadline_urgency !== 'none'"
                                      class="text-xs px-1.5 py-0.5 rounded"
                                      :class="urgencyClasses(task.deadline_urgency)"
                                      x-text="urgencyLabel(task.deadline_urgency, task.deadline)">
                                </span>
                                <button @click="setAsNow(task.id)"
                                        class="p-1.5 text-gray-600 hover:text-violet-400 hover:bg-violet-500/10 rounded-md opacity-0 group-hover:opacity-100 transition"
                                        title="Fazer agora">
                                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M8 5v14l11-7z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
            <div x-show="backlogTasks.length > 0">
                <button @click="showBacklog = !showBacklog" class="flex items-center gap-2 mb-2">
                    <span class="text-sm font-medium uppercase tracking-wider text-gray-600">📦 Backlog</span>
                    <span class="text-xs bg-gray-800/50 text-gray-600 px-2 py-0.5 rounded-full" x-text="backlogTasks.length"></span>
                    <svg class="w-3.5 h-3.5 text-gray-700 transition-transform" :class="showBacklog ? 'rotate-180' : ''"
                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2" stroke-linecap="round" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div x-show="showBacklog" class="space-y-1 opacity-50">
                    <template x-for="task in backlogTasks" :key="task.id">
                        <div class="flex items-center justify-between py-2 px-3 rounded-lg hover:bg-gray-800/20 transition border-l-[3px] border-l-transparent">
                            <div class="flex items-center gap-3 flex-1 min-w-0">
                                <div class="w-[18px]"></div>
                                <span x-show="task.project"
                                      class="text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded shrink-0"
                                      :style="`background: ${getProjectColor(task.project)}20; color: ${getProjectColor(task.project)}; border: 1px solid ${getProjectColor(task.project)}40;`"
                                      x-text="task.project">
                                </span>
                                <span class="text-sm text-gray-500 truncate" x-text="task.title"></span>
                            </div>
                            <span x-show="task.short_id" class="text-xs text-gray-700 font-mono" x-text="task.short_id"></span>
                        </div>
                    </template>
                </div>
            </div>
        </section>

    </main>

    <!-- ==================== SIDEBAR ==================== -->
    <aside class="w-[300px] border-l border-gray-800 bg-gray-950 p-5 overflow-y-auto space-y-6 shrink-0">
        <div>
            <p class="text-xs text-gray-500 uppercase tracking-wider">Hoje</p>
            <h2 class="text-xl font-semibold text-white" x-text="todayDate"></h2>
            <p class="text-2xl font-light text-violet-400 font-mono-timer" x-text="currentTime"></p>
        </div>

        <!-- Agenda -->
        <div>
            <div class="flex items-center gap-2 mb-3">
                <svg class="w-3.5 h-3.5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2" stroke-width="2"/>
                    <path stroke-width="2" d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
                <h3 class="text-xs font-medium uppercase tracking-wider text-gray-400">Agenda</h3>
                <span class="text-xs text-gray-600" x-text="agenda.length"></span>
            </div>
            <div class="relative space-y-0">
                <div class="absolute left-[7px] top-2 bottom-2 w-[1px] bg-gray-800"></div>
                <template x-for="(event, idx) in agenda" :key="idx">
                    <div class="flex items-start gap-3 py-1.5 relative">
                        <div class="w-[15px] h-[15px] rounded-full border-2 shrink-0 mt-0.5 z-10"
                             :class="event.is_now ? 'bg-violet-500 border-violet-400 pulse-glow' : 'bg-gray-900 border-gray-700'">
                        </div>
                        <div class="flex-1 min-w-0">
                            <span class="text-xs text-gray-500 font-mono" x-text="event.time"></span>
                            <p class="text-sm truncate" :class="event.is_now ? 'text-white' : 'text-gray-400'" x-text="event.title"></p>
                        </div>
                        <span class="text-[10px] text-gray-600 shrink-0" x-text="`${event.duration_min}min`"></span>
                    </div>
                </template>
                <p x-show="agenda.length === 0" class="text-sm text-gray-600 pl-6">Nenhum compromisso</p>
            </div>
        </div>

        <!-- Deadlines Próximas -->
        <div x-show="upcomingDeadlines.length > 0">
            <div class="flex items-center gap-2 mb-3">
                <svg class="w-3.5 h-3.5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2" stroke-linecap="round" d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                </svg>
                <h3 class="text-xs font-medium uppercase tracking-wider text-gray-400">Vence Logo</h3>
            </div>
            <div class="space-y-2">
                <template x-for="(d, idx) in upcomingDeadlines" :key="idx">
                    <div class="flex items-center justify-between py-1.5 px-2 rounded-md"
                         :class="d.urgency === 'overdue' ? 'bg-red-500/5 border border-red-500/20' : d.urgency === 'today' ? 'bg-red-500/5' : ''">
                        <div class="flex items-center gap-2 min-w-0">
                            <span class="text-[10px]" x-text="d.urgency === 'overdue' || d.urgency === 'today' ? '🔴' : '🟠'"></span>
                            <span class="text-xs text-gray-300 truncate" x-text="d.task_title"></span>
                        </div>
                        <span class="text-[10px] shrink-0 ml-2"
                              :class="d.urgency === 'overdue' ? 'text-red-400 font-medium' : 'text-gray-500'"
                              x-text="d.date">
                        </span>
                    </div>
                </template>
            </div>
        </div>

        <!-- Bloqueios -->
        <div x-show="blockedTasks.length > 0">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-sm">⏸</span>
                <h3 class="text-xs font-medium uppercase tracking-wider text-gray-400">Bloqueios</h3>
            </div>
            <div class="space-y-2">
                <template x-for="b in blockedTasks" :key="b.id">
                    <div class="text-xs">
                        <p class="text-gray-400" x-text="b.title"></p>
                        <p class="text-amber-500/60 mt-0.5">
                            <span x-text="b.blocker"></span>
                            <span x-show="b.blocker_days >= 3" class="text-red-400/60 ml-1" x-text="`(${b.blocker_days}d)`"></span>
                        </p>
                    </div>
                </template>
            </div>
        </div>

        <!-- Memórias IA -->
        <div x-show="memories.length > 0">
            <div class="flex items-center gap-2 mb-3">
                <svg class="w-3.5 h-3.5 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2" d="M12 2a8 8 0 018 8c0 3.5-2 6-4 7.5V19a2 2 0 01-2 2h-4a2 2 0 01-2-2v-1.5C6 16 4 13.5 4 10a8 8 0 018-8z"/>
                </svg>
                <h3 class="text-xs font-medium uppercase tracking-wider text-gray-400">IA Sabe</h3>
            </div>
            <div class="space-y-1.5">
                <template x-for="(m, idx) in memories.slice(0, 3)" :key="idx">
                    <div class="flex items-start gap-2">
                        <span class="text-[10px] mt-0.5 text-violet-400">•</span>
                        <p class="text-xs text-gray-500" x-text="m.content"></p>
                    </div>
                </template>
            </div>
        </div>

        <!-- Status do dia -->
        <div class="pt-4 border-t border-gray-800">
            <template x-if="upcomingDeadlines.filter(d => d.urgency === 'today').length === 0">
                <div class="bg-green-500/5 border border-green-500/10 rounded-lg p-3 text-center">
                    <span class="text-lg">🟢</span>
                    <p class="text-xs text-green-400/80 mt-1">Dia limpo de prazo 🎉</p>
                </div>
            </template>
            <template x-if="upcomingDeadlines.filter(d => d.urgency === 'today').length > 0">
                <div class="bg-red-500/5 border border-red-500/10 rounded-lg p-3 text-center">
                    <span class="text-lg">🔴</span>
                    <p class="text-xs text-red-400/80 mt-1"
                       x-text="`${upcomingDeadlines.filter(d => d.urgency === 'today').length} deadline(s) hoje`"></p>
                </div>
            </template>
        </div>
    </aside>
</div>

<script>
function dashboard() {
    return {
        nowTask: null,
        todayTasks: [],
        blockedTasks: [],
        queuedTasks: [],
        backlogTasks: [],
        agenda: [],
        upcomingDeadlines: [],
        memories: [],
        freeMinutes: 0,
        totalEstimated: 0,
        workProgress: 0,
        todayDate: '',
        currentTime: '',
        showBlocked: true,
        showQueued: true,
        showBacklog: false,
        timerActive: false,
        timerSeconds: 0,
        timerInterval: null,
        projectColors: {
            'Hotmart': '#FF4000',
            'FIRE 26': '#EF4444',
            'Explorer 2026': '#10b981',
            'Motion Kit': '#10B981',
            'Black November': '#a855f7',
            'Galaxy 26': '#8B5CF6',
            'Spark': '#F59E0B',
            'Jornada': '#06b6d4',
            'Aftermovie Q1': '#06B6D4',
            'Aftermovie': '#ec4899',
            'Pessoal': '#6B7280',
        },

        async init() {
            await this.fetchData();
            this.updateClock();
            setInterval(() => this.updateClock(), 1000);
            setInterval(() => this.fetchData(), 60000);
        },

        async fetchData() {
            try {
                const res = await fetch('/api/tasks/dashboard');
                if (!res.ok) throw new Error(res.statusText);
                const data = await res.json();
                this.nowTask        = data.now_task;
                this.todayTasks     = (data.today_tasks || []).map(t => ({...t, _expanded: false}));
                this.blockedTasks   = data.blocked_tasks || [];
                this.queuedTasks    = data.queued_tasks || [];
                this.backlogTasks   = data.backlog_tasks || [];
                this.agenda         = data.agenda || [];
                this.upcomingDeadlines = data.upcoming_deadlines || [];
                this.memories       = data.memories || [];
                this.freeMinutes    = data.time_available?.total_free_minutes || 0;
                this.workProgress   = data.time_available?.work_progress || 0;
                this.todayDate      = data.today_date || '';
                this.totalEstimated = this.todayTasks.reduce((s, t) => s + (t.estimated_minutes || 45), 0);
            } catch (e) {
                console.error('Dashboard fetch error:', e);
            }
        },

        updateClock() {
            const now = new Date();
            this.currentTime = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            const h = now.getHours(), m = now.getMinutes();
            const min9 = (h - 9) * 60 + m;
            this.workProgress = Math.max(0, Math.min(100, (min9 / (9 * 60)) * 100));
        },

        toggleTimer() {
            if (this.timerActive) {
                clearInterval(this.timerInterval);
                this.timerActive = false;
            } else {
                this.timerSeconds = 0;
                this.timerActive = true;
                this.timerInterval = setInterval(() => this.timerSeconds++, 1000);
            }
        },

        formatTimer(s) {
            return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        },

        async completeTask(id) {
            if (!id) return;
            await fetch(`/api/tasks/${id}/complete`, { method: 'POST' });
            await this.fetchData();
        },

        async setAsNow(id) {
            await fetch(`/api/tasks/${id}/set-now`, { method: 'POST' });
            await this.fetchData();
        },

        async switchNowTask() {
            if (this.todayTasks.length > 0) await this.setAsNow(this.todayTasks[0].id);
        },

        get freeTimeText() {
            const h = Math.floor(this.freeMinutes / 60);
            const m = this.freeMinutes % 60;
            return h > 0 ? `${h}h${m > 0 ? String(m).padStart(2,'0')+'min' : ''}` : `${m}min`;
        },

        getProjectColor(project) {
            return this.projectColors[project] || '#6b7280';
        },

        urgencyClasses(u) {
            return {
                overdue:   'bg-red-500/10 text-red-400 border border-red-500/30',
                today:     'bg-red-500/10 text-red-400 border border-red-500/20',
                tomorrow:  'bg-orange-500/10 text-orange-400 border border-orange-500/20',
                this_week: 'bg-yellow-500/10 text-yellow-500 border border-yellow-500/20',
            }[u] || '';
        },

        urgencyBorderClass(u) {
            return {
                overdue:   'border-l-red-500',
                today:     'border-l-red-400',
                tomorrow:  'border-l-orange-400',
                this_week: 'border-l-yellow-500/50',
            }[u] || 'border-l-transparent';
        },

        urgencyLabel(u, deadline) {
            if (u === 'this_week' && deadline) {
                try {
                    const d = new Date(deadline);
                    const days = ['dom','seg','ter','qua','qui','sex','sáb'];
                    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
                    return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
                } catch {}
            }
            return { overdue:'Atrasado', today:'Hoje', tomorrow:'Amanhã', this_week:'Essa semana' }[u] || '';
        },
    };
}
</script>
</body>
</html>
